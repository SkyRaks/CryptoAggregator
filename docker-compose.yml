services:
  backend:
    build: ./backend
    container_name: crypto-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - redis
  frontend:
    build: ./frontend
    container_name: crypto-frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine 
    container_name: cryptoApp-redis
    ports:
      - "6379:6379"